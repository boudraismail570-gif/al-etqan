<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Luxury Corporate Website</title>
    <!-- Google Fonts Import directly in Head to prevent flashing -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* DESIGN SYSTEM VARIABLES */
        :root {
            --bg-primary: #070B14;
            --bg-secondary: #0D1322;
            --bg-tertiary: #131B2E;
            --text-primary: #FFFFFF;
            --text-secondary: #8A99AD;
            --accent-blue: #4DA3FF;
            --accent-cyan: #4FFFE5;
            --accent-purple: #A16EFF;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-blur: blur(24px);
            --radius-premium: 24px;
            --transition-smooth: cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* RESET & BASE STYLES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* BACKGROUND CINEMATIC EFFECTS */
        .ambient-glow-1 {
            position: absolute;
            top: -10%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(77,163,255,0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: absolute;
            top: 40%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(161,110,255,0.12) 0%, rgba(0,0,0,0) 70%);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }

        /* SCROLL PROGRESS INDICATOR */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan), var(--accent-purple));
            width: 0%;
            z-index: 1000;
        }

        /* RESPONSIVE CONTAINER */
        .container {
            max-width: 1440px;
            width: 100%;
            margin: 0 auto;
            padding: 0 80px;
        }

        @media (max-width: 1024px) {
            .container { padding: 0 40px; }
        }
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
        }

        /* SECTION LAYOUT RHYTHM */
        .section-padding {
            padding-top: 140px;
            padding-bottom: 140px;
        }
        @media (max-width: 768px) {
            .section-padding {
                padding-top: 80px;
                padding-bottom: 80px;
            }
        }

        /* GLASSMORPHISM UNIVERSAL STYLE */
        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-premium);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.5s var(--transition-smooth);
        }

        /* FIXED NAVIGATION BAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            z-index: 999;
            transition: all 0.4s var(--transition-smooth);
            background: transparent;
            border-bottom: 1px solid transparent;
        }

        .navbar.scrolled {
            background: rgba(7, 11, 20, 0.75);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            height: 70px;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .logo:hover {
            transform: scale(1.02);
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.3s ease, transform 0.3s ease;
            position: relative;
            padding: 8px 0;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            transition: width 0.3s var(--transition-smooth);
        }

        .nav-links a.active::after, .nav-links a:hover::after {
            width: 100%;
        }

        /* MOBILE MENU BUG FIX OVERLAYS */
        .menu-btn {
            display: none;
            cursor: pointer;
            flex-direction: column;
            gap: 6px;
            z-index: 1001;
        }

        .menu-btn span {
            width: 28px;
            height: 2px;
            background-color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100vh;
            background: rgba(7, 11, 20, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            z-index: 1000;
            transition: right 0.5s var(--transition-smooth);
        }

        .mobile-menu.open {
            right: 0;
        }

        .mobile-menu a {
            color: var(--text-secondary);
            font-size: 28px;
            text-decoration: none;
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s var(--transition-smooth);
        }

        .mobile-menu.open a {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 900px) {
            .nav-links { display: none; }
            .menu-btn { display: flex; }
        }

        /* HERO SECTION */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            padding-top: 100px;
            overflow: hidden;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 60px;
            align-items: center;
            width: 100%;
        }

        @media (max-width: 1024px) {
            .hero-grid {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 40px;
            }
        }

        .hero-left {
            opacity: 0;
            transform: translateY(40px);
            animation: heroEntrance 1.2s var(--transition-smooth) forwards 0.2s;
        }

        @keyframes heroEntrance {
            to { opacity: 1; transform: translateY(0); }
        }

        .hero h1 {
            font-size: clamp(40px, 5vw, 68px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #FFF 30%, #8A99AD 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 580px;
        }

        @media (max-width: 1024px) {
            .hero p { margin: 0 auto 40px auto; }
        }

        .hero-ctas {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
        }

        @media (max-width: 1024px) {
            .hero-ctas { justify-content: center; }
        }

        /* PREMIUM BUTTON TWEAKS */
        .btn {
            padding: 16px 36px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s var(--transition-smooth);
            cursor: pointer;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            color: var(--text-primary);
            box-shadow: 0 10px 30px rgba(77, 163, 255, 0.3);
            border: none;
        }
