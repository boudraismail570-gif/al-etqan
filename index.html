<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Luxury Corporate</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* -------------------------------------------------------------
           1. DESIGN SYSTEM & RESET
        ------------------------------------------------------------- */
        :root {
            --bg-primary: #070B14;
            --bg-secondary: #0D1322;
            --bg-tertiary: #131B2E;
            --text-primary: #FFFFFF;
            --text-secondary: #8A99AD;
            --accent-blue: #4DA3FF;
            --accent-cyan: #4FFFE5;
            --accent-purple: #A16EFF;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-blur: blur(24px);
            --radius-premium: 24px;
            --container-max: 1440px;
            --container-width: 1280px;
            --cubic-bezier: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--bg-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body {
            overflow-x: hidden;
            position: relative;
        }

        /* Scroll Progress Bar */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan), var(--accent-purple));
            width: 0%;
            z-index: 9999;
            transition: width 0.1s ease-out;
        }

        /* Reusable Components */
        .container {
            max-width: var(--container-max);
            width: 100%;
            padding: 0 40px;
            margin: 0 auto;
        }

        .section-padding {
            padding-top: 140px;
            padding-bottom: 140px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-premium);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transition: transform 0.5s var(--cubic-bezier), box-shadow 0.5s var(--cubic-bezier), background 0.5s var(--cubic-bezier);
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #FFF 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin-bottom: 60px;
            line-height: 1.6;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s var(--cubic-bezier);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: var(--text-primary);
            border: none;
            box-shadow: 0 4px 20px rgba(77, 163, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(77, 163, 255, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        /* Background Animated Elements */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(77,163,255,0.08) 0%, rgba(161,110,255,0.03) 50%, rgba(0,0,0,0) 100%);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: pulseGlow 15s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 40px) scale(1.2); }
        }

        /* -------------------------------------------------------------
           2. NAVIGATION BAR
        ------------------------------------------------------------- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 24px 0;
            transition: all 0.5s var(--cubic-bezier);
        }

        .navbar.scrolled {
            padding: 16px 0;
            background: rgba(7, 11, 20, 0.75);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.03em;
            transition: transform 0.3s ease;
        }

        .logo span {
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease, transform 0.3s ease;
            position: relative;
            padding: 8px 0;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            transition: width 0.3s var(--cubic-bezier);
        }

        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            color: var(--text-primary);
            cursor: pointer;
        }

        /* Mobile Overlay Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(7, 11, 20, 0.95);
            backdrop-filter: blur(30px);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            transform: translateY(-100%);
            transition: transform 0.6s var(--cubic-bezier);
        }

        .mobile-menu.open {
            transform: translateY(0);
        }

        .mobile-menu a {
            color: var(--text-primary);
            font-size: 1.8rem;
            font-weight: 600;
            text-decoration: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .mobile-menu.open a {
            opacity: 1;
            transform: translateY(0);
        }

        /* -------------------------------------------------------------
           3. HERO SECTION
        ------------------------------------------------------------- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            padding-top: 120px;
            overflow: hidden;
            background: radial-gradient(circle at 80% 20%, rgba(161,110,255,0.06), transparent 50%);
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 60px;
            align-items: center;
            width: 100%;
        }

        .hero-content {
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1s var(--cubic-bezier) forwards;
        }
