<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المجموعة العالمية الفاخرة | المستقبل بلمسة إلكترونية</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* نظام الألوان الفاخر المعتمد في الوصف */
        :root {
            --bg-main: #070B14;
            --bg-surface-1: #0D1322;
            --bg-surface-2: #131B2E;
            --accent-blue: #4DA3FF;
            --accent-cyan: #4FFFE5;
            --accent-purple: #A16EFF;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --ease-premium: cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; text-decoration: none; list-style: none; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }

        /* شريط مراقبة التمرير العلوي المباشر */
        .scroll-progress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(to left, var(--accent-cyan), var(--accent-blue)); width: 0%; z-index: 2000; transition: width 0.1s ease; }

        /* القائمة الزجاجية التفاعلية الاحترافية (Intersection Observer) */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(7, 11, 20, 0); border-bottom: 1px solid rgba(255,255,255,0);
            display: flex; justify-content: space-between; align-items: center; padding: 25px 8%;
            transition: all 0.5s var(--ease-premium);
        }
        nav.scrolled {
            background: rgba(7, 11, 20, 0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border); padding: 18px 8%; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .logo { font-weight: 900; font-size: 28px; letter-spacing: -1px; background: linear-gradient(to left, var(--accent-cyan), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 35px; }
        .nav-links a { color: var(--text-secondary); font-weight: 700; font-size: 15px; position: relative; padding: 5px 0; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-cyan); }
        .nav-links a::after { content: ''; position: absolute; bottom: 0; right: 0; width: 0; height: 2px; background: var(--accent-cyan); transition: width 0.3s var(--ease-premium); }
        .nav-links a.active::after { width: 100%; }

        /* واجهة سينمائية تفاعلية ومؤثرات العمق الهولوغرامية */
        .hero {
            min-height: 100vh; padding: 160px 8% 100px 8%; display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 40px;
            background: radial-gradient(circle at 80% 40%, rgba(161, 110, 255, 0.1), transparent 50%), radial-gradient(circle at 20% 70%, rgba(77, 163, 255, 0.12), transparent 50%);
        }
        .hero-content h1 { font-size: 58px; font-weight: 900; line-height: 1.15; margin-bottom: 25px; background: linear-gradient(to bottom, #ffffff 60%, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-content p { font-size: 19px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 45px; }
        .hero-btns { display: flex; gap: 20px; }

        /* أزرار فاخرة متفاعلة بالتأثير الموجي المتوهج */
        .btn-glow {
            padding: 16px 42px; font-weight: 700; font-size: 16px; border-radius: 50px; cursor: pointer; border: none;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-purple)); color: white;
            box-shadow: 0 0 25px rgba(77, 163, 255, 0.3); transition: all 0.4s var(--ease-premium);
        }
        .btn-glow:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 0 40px var(--accent-blue); }
        .btn-outline { padding: 16px 42px; font-weight: 700; font-size: 16px; border-radius: 50px; cursor: pointer; background: var(--glass-bg); color: white; border: 1px solid var(--glass-border); transition: 0.3s; }
        .btn-outline:hover { background: rgba(255,255,255,0.1); border-color: var(--accent-cyan); }

        /* التكوين البصري ثلاثي الأبعاد المذكور في الوصف (3D Composition Panel) */
        .hero-visual { display: flex; justify-content: center; align-items: center; position: relative; height: 100%; }
        .glass-panel-3d {
            width: 85%; height: 380px; background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); position: relative;
            animation: floating 6s ease-in-out infinite;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.01) 100%);
        }
        .orb { position: absolute; border-radius: 50%; filter: blur(40px); animation: pulsing 4s infinite alternate; }
        .orb-1 { width: 140px; height: 140px; background: var(--accent-cyan); top: -20px; left: -20px; opacity: 0.4; }
        .orb-2 { width: 180px; height: 180px; background: var(--accent-purple); bottom: -40px; right: -20px; opacity: 0.3; }

        @keyframes floating { 0% { transform: translateY(0px) rotate(1deg); } 50% { transform: translateY(-15px) rotate(-1deg); } 100% { transform: translateY(0px) rotate(1deg); } }
        @keyframes pulsing { 0% { transform: scale(1); opacity: 0.3; } 100% { transform: scale(1.15); opacity: 0.5; } }

        /* مصفوفة الخدمات الزجاجية المتقدمة (Luxury Matrix Grid) */
        section { padding: 140px 8%; text-align: center; }
        .section-title { font-size: 42px; font-weight: 900; margin-bottom: 65px; letter-spacing: -1px; }
        .section-title span { background: linear-gradient(to left, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .matrix-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 35px; }
        .glass-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 50px 35px; text-align: right; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            transition: all 0.4s var(--ease-premium); cursor: pointer; position: relative; overflow: hidden;
        }
        /* تأثيرات حركة الـ Hover الهولوغرامية التفاعلية */
        .glass-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, transparent, rgba(79, 255, 229, 0.05)); opacity: 0; transition: 0.4s; }
        .glass-card:hover { transform: translateY(-10px) scale(1.02); border-color: rgba(79, 255, 229, 0.4); box-shadow: 0 30px 60px rgba(6, 182, 212, 0.15); background: rgba(255,255,255,0.09); }
        .glass-card:hover::before { opacity: 1; }
        .card-num { font-size: 14px; font-weight: 700; color: var(--accent-blue); margin-bottom: 20px; display: block; letter-spacing: 2px; }
        .glass-card h3 { font-size: 24px; margin-bottom: 15px; color: var(--text-primary); }
        .glass-card p { color: var(--text-secondary); font-size: 15px; line-height: 1.8; }

        /* قسم الإحصائيات العدادات الرقمية الآلية */
        .stats-section { background: var(--bg-surface-1); border-top: 1px solid rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.03); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 30px; }
        .stat-box h2 { font-size: 52px; font-weight: 900; color: #fff; margin-bottom: 10px; background: linear-gradient(to right, #fff, var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-box p { color: var(--text-secondary); font-size: 15px; }

        /* قسم الأسئلة الشائعة الأكورديون التفاعلي */
        .faq-section { background: var(--bg-main); }
        .faq-container { max-width: 800px; margin: 0 auto; text-align: right; }
        .faq-item { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; margin-bottom: 20px; overflow: hidden; transition: 0.3s var(--ease-premium); }
        .faq-trigger { padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 700; font-size: 18px; }
        .faq-icon { font-size: 20px; color: var(--accent-cyan); transition: transform 0.4s var(--ease-premium); }
        .faq-content { max-height: 0; padding: 0 30px; color: var(--text-secondary); font-size: 15px; line-height: 1.8; transition: all 0.4s var(--ease-premium); opacity: 0; }
        .faq-item.active { border-color: rgba(161, 110, 255, 0.3); background: rgba(255,255,255,0.08); }
        .faq-item.active .faq-trigger { color: var(--accent-cyan); }
        .faq-item.active .faq-icon { transform: rotate(45deg); color: var(--accent-purple); }
        .faq-item.active .faq-content { max-height: 200px; padding-bottom: 25px; opacity: 1; }

        /* لوحة التحكم العائمة الذكية (Action Panel) */
        .floating-actions { position: fixed; bottom: 35px; left: 35px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .float-btn {
            width: 60px; height: 60px; border-radius: 50%; background: var(--glass-bg); border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer; transition: all 0.3s var(--ease-premium);
        }
